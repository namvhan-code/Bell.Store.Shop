<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bell.Store.Shop Payment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #FFD1E6 0%, #BFE9FF 100%);
            min-height: 100vh;
        }
        
        @keyframes float-up-down { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(10deg); } }
        @keyframes dash { to { stroke-dashoffset: -20; } }
        
        .animate-dash { stroke-dasharray: 8; animation: dash 1s linear infinite; }
        .anim-float { animation: float-up-down 4s ease-in-out infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 50px -10px rgba(255, 182, 193, 0.4);
        }

        .virtual-card { 
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            border: 2px solid transparent;
        }
        .virtual-card:hover { transform: translateY(-4px); border-color: rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body class="flex flex-col items-center py-6 px-4 text-gray-700 relative overflow-x-hidden">

    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <svg class="absolute top-[5%] left-[10%] w-8 h-8 text-pink-400 anim-float" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-pink-500/90 backdrop-blur-sm text-white px-6 py-3 rounded-full shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 font-medium text-sm">
        คัดลอกเลขบัญชีแล้ว
    </div>

    <div class="max-w-[420px] w-full relative z-10 space-y-5 pb-10">
        <div class="text-center pt-2 pb-2">
            <h1 class="text-2xl font-bold text-gray-800">Bell.Store.Shop</h1>
            <p class="text-sm font-medium text-gray-500 mt-1">Payment & Checkout</p>
        </div>

        <div class="glass-card rounded-[40px] p-4">
            <!-- ลูกเล่นกรอบไข่ปลา -->
            <div class="relative p-2">
                <svg class="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 400 400" preserveAspectRatio="none">
                    <rect x="2" y="2" width="396" height="396" rx="30" fill="none" stroke="#FFB7C5" stroke-width="4" class="animate-dash" />
                </svg>
                <div class="rounded-[28px] overflow-hidden border-[4px] border-white">
                    <img src="https://lh3.googleusercontent.com/d/1rMb9wgnqa0z3-Lyb6myvRJ-BE-B3nev7" alt="QR Code" class="w-full h-auto">
                </div>
            </div>

            <div class="p-4 pt-6 space-y-5">
                <div class="text-center">
                    <p class="text-[15px] font-medium text-gray-700">
                        ชื่อบัญชี <span class="text-pink-600 font-bold bg-pink-50 px-2 py-0.5 rounded-lg border border-pink-100">นางสาวณัฐกฤตา สุขใจ</span>
                    </p>
                </div>

                <div class="space-y-4">
                    <div class="virtual-card bg-gradient-to-r from-blue-400 to-blue-500 rounded-[24px] p-5 shadow-lg text-white" onclick="copyText('5451004540')">
                        <div class="flex justify-between mb-2"><span class="font-bold">กสิกรไทย</span><span class="text-xs bg-white/20 px-2 py-1 rounded-full">คัดลอก</span></div>
                        <div class="text-2xl font-bold tracking-widest">545-1-00454-0</div>
                    </div>

                    <div class="virtual-card bg-gradient-to-r from-blue-400 to-blue-600 rounded-[24px] p-5 shadow-lg text-white" onclick="copyText('6637935824')">
                        <div class="flex justify-between mb-2"><span class="font-bold">กรุงไทย</span><span class="text-xs bg-white/20 px-2 py-1 rounded-full">คัดลอก</span></div>
                        <div class="text-2xl font-bold tracking-widest">663-7-93582-4</div>
                    </div>

                    <div class="virtual-card bg-gradient-to-r from-pink-400 to-pink-500 rounded-[24px] p-5 shadow-lg text-white" onclick="copyText('0953351519')">
                        <div class="flex justify-between mb-2"><span class="font-bold">TrueMoney Wallet</span><span class="text-xs bg-white/20 px-2 py-1 rounded-full">คัดลอก</span></div>
                        <div class="text-2xl font-bold tracking-widest">095-335-1519</div>
                    </div>

                    <a href="https://lin.ee/w82pHL0" class="virtual-card flex flex-col items-center justify-center bg-white border-2 border-pink-200 rounded-[24px] p-5 shadow-md text-pink-600 font-bold text-center">
                        <span class="text-lg">สอบถาม / สั่งซื้อสินค้า</span>
                    </a>

                    <div class="bg-pink-50 border border-pink-100 rounded-2xl p-4 text-[13px] text-gray-700 text-center">
                        <p>โอนแล้วแจ้งสลิปด้วยนะคะ | สอบถามก่อนโอนทุกครั้งงับ</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function copyText(text) {
            navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 2000);
        }
    </script>
</body>
</html>
